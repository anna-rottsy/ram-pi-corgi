<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Day Corgi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Темный фон */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        h1 {
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
            margin-bottom: 20px;
            z-index: 10;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        canvas {
            display: block;
            /* Маска для канваса, чтобы цифры были только внутри корги */
            /* Мы используем SVG clip-path для точной формы */
            clip-path: url(#corgi-clip); 
        }

        /* Стили для SVG (сама форма корги для маски) */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Чтобы клики проходили сквозь */
        }
        
        /* Рамка вокруг корги для красоты */
        .border-shape {
            fill: none;
            stroke: #ffcc00;
            stroke-width: 2;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>Happy Pi Day! 🥧</h1>

    <div class="canvas-container">
        <!-- SVG Маска: Силуэт корги -->
        <svg viewBox="0 0 200 200">
            <defs>
                <clipPath id="corgi-clip">
                    <!-- Это path (контур) корги -->
                    <path d="M145.5,55.5c-5.5-10-15-18-26-21c-3.5-1-7-1.5-10.5-1.5c-6,0-11.5,1.5-16.5,4c-3-1.5-6.5-2.5-10-2.5
                    c-10,0-18.5,6-22.5,14.5c-2.5-0.5-5-0.5-7.5,0c-8.5,2-15,9.5-15,18.5c0,1.5,0.5,3,1,4.5c-3,3.5-5,8-5,13c0,9,6.5,16.5,15,18.5
                    c0.5,1.5,1,3,1,4.5c0,10,8,18,18,18c1,0,2,0,3-0.5c2.5,3,6.5,5,10.5,5c6,0,11-3,14-7.5c3,0.5,6,1,9,1c10,0,18-8,18-18
                    c0-1.5-0.5-3-1-4.5c8.5-2,15-9.5,15-18.5c0-5-2-9.5-5-13c0.5-1.5,1-3,1-4.5C155.5,64.5,152,60,145.5,55.5z"/>
                </clipPath>
            </defs>
            <!-- Рисуем контур корги для красоты -->
            <use href="#corgi-clip" class="border-shape" />
        </svg>

        <!-- Канвас, где будут рисоваться цифры -->
        <canvas id="piCanvas"></canvas>
    </div>

        const canvas = document.getElementById('piCanvas');

        canvas.width = 400;
