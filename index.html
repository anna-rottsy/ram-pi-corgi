<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Day Corgi - 3.14</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Happy Pi Day!</h1>
            <div class="icons">
                <img class="corgi-icon" width="64" height="64" src="https://img.icons8.com/color/48/corgi.png" alt="corgi"/>
                <img class="pie-icon" width="64" height="64" src="https://img.icons8.com/color/48/pie.png" alt="pie"/>
            </div>
        </header>

        <div class="corgi-container" id="corgiContainer">
            <img class="corgi-main" src="https://img.icons8.com/color/96/corgi.png" alt="Corgi"/>
            <div id="piDigitsContainer"></div>
        </div>

        <div class="pi-info">
            <p class="pi-symbol">π ≈ <span id="piDisplay">3.141592653589793238462643383279</span></p>
            <p class="date">March 14 - International Pi Day</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
