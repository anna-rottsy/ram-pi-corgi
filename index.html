<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Pi Day</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Happy Pi Day!</h1>

<svg viewBox="0 0 800 400">

<path
id="corgiPath"
d="M100 250
   Q150 150 200 250
   Q230 220 260 250
   Q300 200 350 250
   Q400 280 450 250
   Q480 200 520 250
   Q560 280 600 240
   Q620 200 650 230
   Q670 260 700 250"

fill="none"
stroke="transparent"
/>

<text font-size="14" fill="#ffcc00">
<textPath href="#corgiPath" id="piText">
</textPath>
</text>

</svg>

<script src="script.js"></script>

</body>
</html>
